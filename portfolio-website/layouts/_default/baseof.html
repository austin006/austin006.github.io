<!DOCTYPE HTML>
<html lang="{{ .Site.Language.Lang | default "en" }}">
	{{ partial "head.html" . }}
	<body class="is-preload">
		<div id="wrapper">
			{{ partial "header.html" . }}
			{{ partial "menu.html" . }}

			<div id="main">
				<div class="inner">
					{{ block "main" . }}{{ end }}
				</div>
			</div>

			{{ partial "footer.html" . }}
		</div>

		{{ partial "scripts.html" . }}
	</body>
</html>
