name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.161.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true
          
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        working-directory: portfolio-website
        run: hugo --minify

      - name: Show built files and sizes
        run: |
          echo "Working dir: $(pwd)"
          echo "List portfolio-website/public (top-level):"
          ls -la portfolio-website/public || true
          echo "Disk usage (summary):"
          du -sh portfolio-website/public || true
          echo "File count:"
          find portfolio-website/public -type f | wc -l || true

      - name: Verify index.html exists
        run: |
          if [ ! -f portfolio-website/public/index.html ]; then
            echo "ERROR: portfolio-website/public/index.html not found. Build likely failed."
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio-website/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4